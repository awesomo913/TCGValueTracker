name: Card Collection CI

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'card_collection_backend/**'
      - 'card_collection_frontend/**'
      - '.github/workflows/card-collection-ci.yml'
  pull_request:
    paths:
      - 'card_collection_backend/**'
      - 'card_collection_frontend/**'

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: card_collection_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m pytest test_api.py -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: card_collection_frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build --if-present
